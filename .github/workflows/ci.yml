name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t events-api:latest .

      - name: Run container
        run: docker run -d -p 5000:5000 --name events-api-container events-api:latest

      - name: Wait for API to start
        run: sleep 5

      - name: Health check
        run: curl http://localhost:5000/api/health

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Stop and remove container
        if: always()
        run: |
          docker stop events-api-container
          docker rm events-api-container

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push image to Docker Hub
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/events-api:latest \
            --push .

      - name: Trigger Render deploy
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Wait for Render to deploy
        run: sleep 30

      - name: Smoke test
        run: |
          curl --fail ${{ secrets.RENDER_BASE_URL }}/api/health